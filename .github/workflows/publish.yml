name: Publish to GitHub Packages

on:
  push:
    branches: [main]
    paths:
      - "claude-commands/**"
      - "skills/**"
      - "agents/**"
      - "hooks/**"
      - "rules/**"
      - "output-styles/**"
      - ".claude-plugin/**"
      - "install-plugin.js"
      - "package.json"
      - "AGENT-GUIDE.md"
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@cure-consulting-group"

      - name: Sync version from plugin.json (single source of truth)
        id: version
        run: |
          PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          CURRENT_NPM_VERSION=$(node -p 'require("./package.json").version')

          if [ "$PLUGIN_VERSION" != "$CURRENT_NPM_VERSION" ]; then
            echo "Syncing package.json version: $CURRENT_NPM_VERSION → $PLUGIN_VERSION"
            jq --arg v "$PLUGIN_VERSION" '.version = $v' package.json > package.tmp.json
            mv package.tmp.json package.json
            echo "synced=true" >> $GITHUB_OUTPUT
          else
            echo "Versions already in sync: $PLUGIN_VERSION"
            echo "synced=false" >> $GITHUB_OUTPUT
          fi

          echo "version=$PLUGIN_VERSION" >> $GITHUB_OUTPUT

      - name: Generate release summary
        id: summary
        run: |
          SKILLS=$(find skills -name "SKILL.md" 2>/dev/null | wc -l | tr -d ' ')
          AGENTS=$(find agents -name "*.md" 2>/dev/null | wc -l | tr -d ' ')
          RULES=$(find rules -name "*.md" 2>/dev/null | wc -l | tr -d ' ')
          STYLES=$(find output-styles -name "output-style.md" 2>/dev/null | wc -l | tr -d ' ')

          echo "skills=$SKILLS" >> $GITHUB_OUTPUT
          echo "agents=$AGENTS" >> $GITHUB_OUTPUT
          echo "rules=$RULES" >> $GITHUB_OUTPUT
          echo "styles=$STYLES" >> $GITHUB_OUTPUT

          # List agents by reading frontmatter
          AGENT_LIST=""
          for f in agents/*.md; do
            NAME=$(head -10 "$f" | grep "^name:" | sed 's/name: *//')
            DESC=$(head -10 "$f" | grep "^description:" | sed 's/description: *//' | cut -c1-80)
            AGENT_LIST="${AGENT_LIST}\n- **${NAME}** — ${DESC}"
          done
          echo "agent_list<<EOF" >> $GITHUB_OUTPUT
          echo -e "$AGENT_LIST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version sync
        if: steps.version.outputs.synced == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: sync package.json version to ${{ steps.version.outputs.version }}"
          git push

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Product Engineering Skills v${{ steps.version.outputs.version }}

            **${{ steps.summary.outputs.skills }}** skills · **${{ steps.summary.outputs.agents }}** agents · **${{ steps.summary.outputs.rules }}** rules · **${{ steps.summary.outputs.styles }}** output styles

            ### Install / Update
            ```bash
            npm install @cure-consulting-group/product-engineering-skills
            ```

            ### Agents
            ${{ steps.summary.outputs.agent_list }}

            ---
            _Consuming projects with Dependabot will receive an auto-update PR within 24 hours._
          generate_release_notes: true
          make_latest: true
