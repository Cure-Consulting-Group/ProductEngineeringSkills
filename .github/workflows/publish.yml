name: Publish to GitHub Packages

on:
  push:
    branches: [main]
    paths:
      - "claude-commands/**"
      - "skills/**"
      - "agents/**"
      - "hooks/**"
      - "rules/**"
      - "output-styles/**"
      - ".claude-plugin/**"
      - "install-plugin.js"
      - "package.json"
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@cure-consulting-group"

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # On release, sync version from plugin.json
            PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
            jq --arg v "$PLUGIN_VERSION" '.version = $v' package.json > package.tmp.json
            mv package.tmp.json package.json
            echo "version=$PLUGIN_VERSION" >> $GITHUB_OUTPUT
            echo "bump=false" >> $GITHUB_OUTPUT
          else
            # On push, auto-bump patch version
            npm version patch --no-git-tag-version
            NEW_VERSION=$(node -p 'require("./package.json").version')
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "bump=true" >> $GITHUB_OUTPUT
          fi

      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        if: steps.version.outputs.bump == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Create GitHub Release
        if: steps.version.outputs.bump == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Product Engineering Skills v${{ steps.version.outputs.version }}

            Updated skills package. Install with:
            ```bash
            npm install @cure-consulting-group/product-engineering-skills
            ```
          generate_release_notes: true
