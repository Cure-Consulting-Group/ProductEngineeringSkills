name: Validate library

# Quality gate for the skill library. Runs on every PR and push so no skill,
# agent, or doc can drift out of spec or out of sync before it ships.

on:
  pull_request:
    paths:
      - "skills/**"
      - "agents/**"
      - "personas/**"
      - "hooks/**"
      - "rules/**"
      - ".claude-plugin/**"
      - "marketplace.json"
      - "CLAUDE.md"
      - "README.md"
      - "scripts/**"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint skills + agents against Anthropic spec
        # Hard spec violations (invalid names, broken preload refs) fail the
        # build. Threshold is a floor, not a target — raise it as quality rises.
        run: |
          python3 scripts/audit-library.py
          python3 scripts/audit-library.py --fail-under 9.0 --min-item 7.0

      - name: No compliance fixes pending (inert fields, broken refs, missing hints)
        run: python3 scripts/fix-library.py --check

      - name: All SKILL.md bodies within 500-line limit (progressive disclosure)
        run: python3 scripts/split-oversized-skills.py --check

      - name: Metadata in sync (counts + version, single source of truth)
        run: python3 scripts/sync-metadata.py --check

      - name: Legacy claude-commands/ in sync with skills/
        run: python3 scripts/sync-legacy-commands.py --check

      - name: Workflow scripts parse (async-context syntax)
        run: bash scripts/verify-workflows.sh

      - name: type:prompt hooks only on low-frequency events, with timeouts
        # Wave 2 (BACKLOG T10/T11) deliberately ships two LLM-evaluating hooks:
        # the Stop quality gate and PostToolUseFailure triage. The original
        # blanket ban protected consumers from an LLM call on EVERY action
        # (prompt/edit/bash) — that intent is preserved as a constraint:
        # prompt hooks are allowed ONLY on Stop and PostToolUseFailure (never
        # on PreToolUse/PostToolUse/UserPromptSubmit hot paths), and every one
        # must declare a timeout ≤ 30s so a slow LLM can never wedge a consumer.
        run: |
          python3 - <<'PY'
          import json, sys
          ALLOWED_EVENTS = {"Stop", "PostToolUseFailure"}
          d = json.load(open("hooks/hooks.json"))
          bad = []
          for ev, groups in d.get("hooks", {}).items():
              for g in groups:
                  for h in g.get("hooks", []):
                      if h.get("type") != "prompt":
                          continue
                      if ev not in ALLOWED_EVENTS:
                          bad.append((ev, "prompt hook on hot-path event (allowed: Stop, PostToolUseFailure)"))
                      elif not isinstance(h.get("timeout"), (int, float)) or h["timeout"] > 30:
                          bad.append((ev, "prompt hook missing timeout ≤ 30"))
          if bad:
              print("FORBIDDEN prompt-hook usage in hooks.json:")
              for ev, why in bad: print(f"  {ev}: {why}")
              sys.exit(1)
          print("Prompt hooks constrained to low-frequency events with timeouts. ✓")
          PY

      - name: No blocking I/O in session-lifecycle hooks
        # SessionStart/PreCompact/PostCompact hooks run synchronously in every
        # consuming project — including every /loop iteration's session. A
        # network call there (npm outdated, curl) blocks the session for the
        # tool's own timeout. This bit us once; never again.
        run: |
          python3 - <<'PY'
          import json, re, sys
          LIFECYCLE = {"SessionStart", "PreCompact", "PostCompact"}
          NET = re.compile(r"\b(npm (outdated|audit|install|ci)|npx |pip |curl |wget |gh |git (fetch|pull|push))\b")
          d = json.load(open("hooks/hooks.json"))
          bad = []
          for ev, groups in d.get("hooks", {}).items():
              if ev not in LIFECYCLE: continue
              for g in groups:
                  for h in g.get("hooks", []):
                      m = NET.search(h.get("command", ""))
                      if m: bad.append((ev, m.group(0)))
          if bad:
              print("FORBIDDEN network/blocking command in session-lifecycle hook:")
              for ev, cmd in bad: print(f"  {ev}: {cmd}")
              sys.exit(1)
          print("Session-lifecycle hooks are local-only and non-blocking. ✓")
          PY

      - name: docs/OVERVIEW.md is up to date
        run: |
          python3 scripts/generate-overview.py
          if ! git diff --quiet -- docs/OVERVIEW.md; then
            echo "::error::docs/OVERVIEW.md is stale. Run: python3 scripts/generate-overview.py"
            git --no-pager diff -- docs/OVERVIEW.md
            exit 1
          fi

      - name: Bundled skill scripts smoke-test (--help)
        run: bash scripts/verify-skill-scripts.sh

      - name: Validate plugin + marketplace manifest schema
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json .mcp.json.example .lsp.json settings.json; do
            python3 -c "import json,sys; json.load(open('$f')); print('ok json: $f')"
          done
          # Plugin manifest field TYPES must match the Claude Code schema
          # (repository/homepage/license = string, author = object, keywords = array).
          # A wrong type here fails `/plugin install` at the consumer, not here — so assert it.
          python3 - <<'PY'
          import json, sys
          p = json.load(open(".claude-plugin/plugin.json"))
          errs = []
          def need(field, typ, label):
              if field in p and not isinstance(p[field], typ):
                  errs.append(f"plugin.json: `{field}` must be {label}, got {type(p[field]).__name__}")
          need("name", str, "string"); need("version", str, "string")
          need("description", str, "string"); need("repository", str, "string")
          need("homepage", str, "string"); need("license", str, "string")
          need("author", dict, "object"); need("keywords", list, "array")
          if "bugs" in p: errs.append("plugin.json: `bugs` is not a plugin-manifest field; remove it")
          m = json.load(open(".claude-plugin/marketplace.json"))
          for f in ("name", "owner", "plugins"):
              if f not in m: errs.append(f"marketplace.json: missing required `{f}`")
          # .lsp.json: standalone form is top-level server names (NO `lspServers`
          # wrapper); each needs string `command` + record `extensionToLanguage`.
          lsp = json.load(open(".lsp.json"))
          if "lspServers" in lsp:
              errs.append(".lsp.json: remove the `lspServers` wrapper (standalone file uses top-level server names)")
          LSP_OK = {"command","extensionToLanguage","args","transport","env","initializationOptions","settings","workspaceFolder","startupTimeout","maxRestarts","diagnostics"}
          for n, c in lsp.items():
              if isinstance(c, dict):
                  if not isinstance(c.get("command"), str): errs.append(f".lsp.json: `{n}.command` must be a string")
                  if not isinstance(c.get("extensionToLanguage"), dict): errs.append(f".lsp.json: `{n}.extensionToLanguage` must be a record")
                  bad = set(c) - LSP_OK
                  if bad: errs.append(f".lsp.json: `{n}` has unknown keys {sorted(bad)}")
          if errs:
              print("MANIFEST SCHEMA ERRORS:", *errs, sep="\n  "); sys.exit(1)
          print("plugin + marketplace manifest schema OK")
          PY
